document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

: 700;\n  font-display: swap;\n  src: url(\"81ee8926-1ab8-424e-b703-507bb8411825\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* arabic */\n@font-face {\n  font-family: 'Tajawal';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"7b3169e0-5fa7-4281-b529-83c433a8a218\") format('woff2');\n  unicode-range: U+0600-06FF, U+0750-077F, U+0870-088E, U+0890-0891, U+0897-08E1, U+08E3-08FF, U+200C-200E, U+2010-2011, U+204F, U+2E41, U+FB50-FDFF, U+FE70-FE74, U+FE76-FEFC, U+102E0-102FB, U+10E60-10E7E, U+10EC2-10EC4, U+10EFC-10EFF, U+1EE00-1EE03, U+1EE05-1EE1F, U+1EE21-1EE22, U+1EE24, U+1EE27, U+1EE29-1EE32, U+1EE34-1EE37, U+1EE39, U+1EE3B, U+1EE42, U+1EE47, U+1EE49, U+1EE4B, U+1EE4D-1EE4F, U+1EE51-1EE52, U+1EE54, U+1EE57, U+1EE59, U+1EE5B, U+1EE5D, U+1EE5F, U+1EE61-1EE62, U+1EE64, U+1EE67-1EE6A, U+1EE6C-1EE72, U+1EE74-1EE77, U+1EE79-1EE7C, U+1EE7E, U+1EE80-1EE89, U+1EE8B-1EE9B, U+1EEA1-1EEA3, U+1EEA5-1EEA9, U+1EEAB-1EEBB, U+1EEF0-1EEF1;\n}\n/* latin */\n@font-face {\n  font-family: 'Tajawal';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"86f6597b-f3bc-4f1a-a622-c419885b7813\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n  :root{\n    --bg:#0E1014;\n    --bg-2:#14171C;\n    --surface:#1A1E25;\n    --surface-2:#22272F;\n    --line:rgba(255,255,255,.08);\n    --line-strong:rgba(255,255,255,.16);\n    --text:#F2F3F5;\n    --muted:#9097A1;\n    --dim:#6B7280;\n    --red:#E11D2A;\n    --red-deep:#B5141F;\n    --red-glow:rgba(225,29,42,.35);\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:\"Tajawal\",\"Cairo\",system-ui,sans-serif;-webkit-font-smoothing:antialiased}\n  body{overflow-x:hidden}\n  img{max-width:100%;display:block}\n  a{color:inherit;text-decoration:none}\n  button{font-family:inherit}\n\n  .container{max-width:1240px;margin:0 auto;padding:0 28px}\n\n  /* ---------- NAV ---------- */\n  .nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);background:rgba(14,16,20,.78);border-bottom:1px solid var(--line)}\n  .nav-row{display:flex;align-items:center;justify-content:space-between;height:72px}\n  .brand{display:flex;align-items:center;gap:12px}\n  .brand img{width:42px;height:42px;border-radius:8px;object-fit:cover}\n  .brand .b-text{display:flex;flex-direction:column;line-height:1.05}\n  .brand .b-text .ar{font-family:\"Cairo\";font-weight:800;font-size:15px;letter-spacing:.5px}\n  .brand .b-text .en{font-size:11px;color:var(--muted);letter-spacing:1.5px}\n  .brand .b-text .en .accent{color:var(--red)}\n  .nav-links{display:flex;gap:28px;font-size:14px;color:var(--muted)}\n  .nav-links a:hover{color:#fff}\n  .nav-cta{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:999px;background:var(--red);color:#fff;font-weight:700;font-size:14px;box-shadow:0 8px 24px -8px var(--red-glow);transition:transform .15s ease}\n  .nav-cta:hover{transform:translateY(-1px)}\n  @media (max-width:780px){.nav-links{display:none}}\n\n  /* ---------- HERO ---------- */\n  .hero{position:relative;padding:80px 0 60px;overflow:hidden}\n  .hero::before{content:\"\";position:absolute;inset:0;background:\n    radial-gradient(800px 500px at 80% -10%, rgba(225,29,42,.18), transparent 60%),\n    radial-gradient(700px 600px at -10% 110%, rgba(225,29,42,.10), transparent 60%);\n    pointer-events:none}\n  .hero-grid{position:relative;display:grid;grid-template-columns:1.15fr .85fr;gap:64px;align-items:center}\n  @media (max-width:980px){.hero-grid{grid-template-columns:1fr;gap:48px}}\n  .eyebrow{display:inline-flex;align-items:center;gap:10px;padding:8px 14px;border:1px solid var(--line-strong);border-radius:999px;font-size:13px;color:#D4D8DE;background:rgba(255,255,255,.02)}\n  .eyebrow .dot{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 0 4px rgba(225,29,42,.18);animation:pulse 1.8s infinite}\n  @keyframes pulse{50%{box-shadow:0 0 0 9px rgba(225,29,42,0)}}\n  h1.headline{font-family:\"Cairo\";font-weight:900;font-size:clamp(36px,5.4vw,68px);line-height:1.12;letter-spacing:-.5px;margin:20px 0 18px}\n  h1.headline .red{color:var(--red)}\n  h1.headline .strike{text-decoration:line-through;text-decoration-color:rgba(225,29,42,.6);text-decoration-thickness:4px;color:var(--muted)}\n  .lede{font-size:clamp(16px,1.4vw,19px);color:#C7CCD3;max-width:580px;line-height:1.85}\n  .questions{margin-top:28px;display:flex;flex-direction:column;gap:10px}\n  .questions .q{display:flex;align-items:flex-start;gap:14px;font-size:16px;color:#D4D8DE}\n  .questions .q::before{content:\"\";flex:none;margin-top:11px;width:18px;height:1.5px;background:var(--red)}\n  .hero-cta-row{display:flex;gap:14px;margin-top:36px;flex-wrap:wrap}\n  .btn-primary{display:inline-flex;align-items:center;gap:10px;padding:16px 28px;border-radius:12px;background:var(--red);color:#fff;font-weight:800;font-size:16px;border:none;cursor:pointer;box-shadow:0 18px 40px -18px var(--red-glow);transition:transform .15s ease,box-shadow .2s ease}\n  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 22px 50px -16px var(--red-glow)}\n  .btn-ghost{display:inline-flex;align-items:center;gap:10px;padding:16px 24px;border-radius:12px;background:transparent;color:#fff;border:1px solid var(--line-strong);font-weight:700;font-size:15px;cursor:pointer}\n  .btn-ghost:hover{border-color:#fff}\n\n  /* hero visual */\n  .hero-card{position:relative;border-radius:20px;overflow:hidden;border:1px solid var(--line-strong);background:linear-gradient(145deg,#1B1F26,#13161B);aspect-ratio:4/5;box-shadow:0 50px 100px -40px rgba(0,0,0,.7)}\n  .hero-card .frame{position:absolute;inset:18px;border:1px solid rgba(255,255,255,.1);border-radius:12px;pointer-events:none}\n  .hero-card .rec{position:absolute;top:30px;right:30px;display:inline-flex;align-items:center;gap:8px;font-family:\"Bebas Neue\";letter-spacing:2px;font-size:14px;color:#fff;background:rgba(0,0,0,.4);padding:6px 12px;border-radius:6px}\n  .hero-card .rec::before{content:\"\";width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse 1.4s infinite}\n  .hero-card .corners span{position:absolute;width:22px;height:22px;border:2px solid #fff;opacity:.85}\n  .hero-card .corners span:nth-child(1){top:30px;left:30px;border-right:none;border-bottom:none}\n  .hero-card .corners span:nth-child(2){top:30px;right:30px;border-left:none;border-bottom:none}\n  .hero-card .corners span:nth-child(3){bottom:30px;left:30px;border-right:none;border-top:none}\n  .hero-card .corners span:nth-child(4){bottom:30px;right:30px;border-left:none;border-top:none}\n  /* image slot fills the entire card; overlays sit above it */\n  .hero-card image-slot{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:0}\n  .hero-card .frame,.hero-card .corners span,.hero-card .rec,.hero-card .lower,.hero-card .scene{z-index:2}\n  /* dark gradient over photo for legibility of the lower caption */\n  .hero-card::after{content:\"\";position:absolute;inset:0;background:linear-gradient(180deg, rgba(0,0,0,0) 35%, rgba(0,0,0,.55) 78%, rgba(0,0,0,.85));pointer-events:none;z-index:1}\n\n  /* empty-state \"studio scene\" placeholder (visible only while no image dropped) */\n  .hero-card .scene{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;padding-bottom:18%;background:\n    repeating-linear-gradient(45deg, rgba(255,255,255,.02) 0 14px, transparent 14px 28px),\n    radial-gradient(ellipse 60% 50% at 30% 35%, rgba(225,29,42,.22), transparent 65%),\n    radial-gradient(ellipse 50% 40% at 78% 30%, rgba(255,210,140,.10), transparent 65%);\n    pointer-events:none;overflow:hidden}\n  .hero-card .scene .silhouette{width:46%;height:62%;background:linear-gradient(180deg, rgba(0,0,0,.0) 0%, rgba(0,0,0,.55) 35%, rgba(0,0,0,.92) 100%);border-radius:120px 120px 0 0;filter:blur(1px);position:absolute;bottom:0;left:50%;transform:translateX(-50%)}\n  .hero-card .scene .silhouette::before{content:\"\";position:absolute;top:-44px;left:50%;transform:translateX(-50%);width:34%;aspect-ratio:1;background:rgba(0,0,0,.92);border-radius:50%;filter:blur(1px)}\n  /* tripod legs */\n  .hero-card .scene .tripod{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);width:42%;height:36%}\n  .hero-card .scene .tripod::before,.hero-card .scene .tripod::after{content:\"\";position:absolute;bottom:0;width:2px;height:100%;background:linear-gradient(180deg, rgba(255,255,255,.0), rgba(255,255,255,.18));transform-origin:bottom center}\n  .hero-card .scene .tripod::before{left:30%;transform:rotate(8deg)}\n  .hero-card .scene .tripod::after{right:30%;transform:rotate(-8deg)}\n  .hero-card .scene .cam{position:absolute;bottom:42%;left:50%;transform:translateX(-50%);width:64px;height:42px;background:#1a1d22;border:1px solid rgba(255,255,255,.18);border-radius:4px;box-shadow:0 6px 18px rgba(0,0,0,.5)}\n  .hero-card .scene .cam::before{content:\"\";position:absolute;top:6px;right:-14px;width:18px;height:30px;background:#1a1d22;border:1px solid rgba(255,255,255,.18);border-radius:4px}\n  .hero-card .scene .cam::after{content:\"●REC\";position:absolute;top:-16px;left:0;font-family:\"Bebas Neue\";font-size:9px;letter-spacing:1px;color:var(--red)}\n  /* studio lights */\n  .hero-card .scene .light{position:absolute;width:46px;height:46px;border-radius:50%;border:2px solid rgba(255,255,255,.22)}\n  .hero-card .scene .light.l1{top:14%;left:10%;background:radial-gradient(circle, rgba(255,235,180,.55), rgba(255,235,180,.05) 70%)}\n  .hero-card .scene .light.l2{top:18%;right:12%;background:radial-gradient(circle, rgba(225,29,42,.55), rgba(225,29,42,.05) 70%)}\n  .hero-card .scene .light.l1::after,.hero-card .scene .light.l2::after{content:\"\";position:absolute;width:1px;height:50px;background:linear-gradient(180deg, rgba(255,255,255,.25), transparent);top:100%;left:50%;transform-origin:top}\n  .hero-card .scene .light.l1::after{transform:translateX(-50%) rotate(-25deg)}\n  .hero-card .scene .light.l2::after{transform:translateX(-50%) rotate(25deg)}\n  /* brief tooltip on the slot (drag/drop hint) */\n  .hero-card .scene .hint{position:relative;z-index:3;font-family:ui-monospace,Menlo,monospace;color:rgba(255,255,255,.55);font-size:11px;letter-spacing:2px;padding:6px 12px;border:1px dashed rgba(255,255,255,.22);border-radius:4px;background:rgba(0,0,0,.35);backdrop-filter:blur(4px)}\n  /* hide scene once a real image is dropped */\n  .hero-card:has(image-slot[data-filled=\"true\"]) .scene{display:none}\n  .hero-card:has(image-slot[data-filled=\"true\"]) .frame{border-color:rgba(255,255,255,.18)}\n  .hero-card .lower{position:absolute;left:30px;right:30px;bottom:30px;display:flex;flex-direction:column;gap:8px}\n  .hero-card .lower .tag{font-family:\"Bebas Neue\";letter-spacing:3px;font-size:13px;color:var(--red)}\n  .hero-card .lower .name{font-family:\"Cairo\";font-weight:800;font-size:28px;line-height:1.1}\n  .hero-card .lower .sub{font-size:13px;color:#C7CCD3}\n  .hero-card .lower::before{content:\"\";position:absolute;left:0;top:-14px;width:42px;height:3px;background:var(--red)}\n\n  /* ---------- MARQUEE ---------- */\n  .marquee{border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:18px 0;background:#0B0D11;overflow:hidden;margin-top:30px}\n  .marquee-track{display:flex;gap:48px;white-space:nowrap;animation:scroll 30s linear infinite;font-family:\"Cairo\";font-weight:800;font-size:18px;color:#3F4651;letter-spacing:1px}\n  .marquee-track .star{color:var(--red);font-size:14px;display:inline-block;transform:translateY(-2px)}\n  @keyframes scroll{to{transform:translateX(50%)}}\n\n  /* ---------- SECTION HEAD ---------- */\n  section{padding:96px 0;position:relative}\n  .sec-head{display:flex;flex-direction:column;gap:14px;margin-bottom:48px;max-width:780px}\n  .kicker{font-family:\"Bebas Neue\";letter-spacing:4px;font-size:14px;color:var(--red);display:flex;align-items:center;gap:12px}\n  .kicker::before{content:\"\";width:32px;height:2px;background:var(--red);display:inline-block}\n  h2.sec-title{font-family:\"Cairo\";font-weight:900;font-size:clamp(28px,3.4vw,46px);line-height:1.2;margin:0;letter-spacing:-.3px}\n  .sec-sub{color:#C7CCD3;font-size:17px;line-height:1.85;max-width:680px}\n\n  /* ---------- FACTS ROW ---------- */\n  .facts{padding:60px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:linear-gradient(180deg,#0B0D11,#0E1014)}\n  .facts-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0}\n  @media (max-width:880px){.facts-grid{grid-template-columns:repeat(2,1fr)}}\n  .fact{padding:20px 28px;border-left:1px solid var(--line)}\n  .fact:last-child{border-left:none}\n  @media (max-width:880px){.fact{border-left:none;border-bottom:1px solid var(--line);padding:24px 16px}.fact:nth-child(2n){border-left:1px solid var(--line)}}\n  .fact .label{font-family:\"Bebas Neue\";letter-spacing:3px;font-size:12px;color:var(--red);margin-bottom:10px}\n  .fact .value{font-family:\"Cairo\";font-weight:800;font-size:24px;line-height:1.25}\n  .fact .meta{margin-top:6px;font-size:13px;color:var(--muted)}\n\n  /* ---------- PILLARS ---------- */\n  .pillars-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}\n  @media (max-width:760px){.pillars-grid{grid-template-columns:1fr}}\n  .pillar{position:relative;padding:32px 30px;background:linear-gradient(180deg,var(--surface),#181C22);border:1px solid var(--line);border-radius:18px;transition:border-color .2s ease,transform .2s ease}\n  .pillar:hover{border-color:var(--line-strong);transform:translateY(-2px)}\n  .pillar .num{font-family:\"Bebas >\n        <div class=\"meta\">٤ ساعات يوميًا<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"fact\">\n        <div class=\"label\">الأسلوب<\u002Fdiv>\n        <div class=\"value\">عملي مكثف<\u002Fdiv>\n        <div class=\"meta\">تطبيق من اليوم الأول<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"fact\">\n        <div class=\"label\">المقاعد<\u002Fdiv>\n        <div class=\"value\">محدودة جدًا<\u002Fdiv>\n        <div class=\"meta\">رسوم مدعومة لفترة قصيرة<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PILLARS -->\n<section id=\"about\">\n  <div class=\"container\">\n    <div class=\"sec-head\">\n      <span class=\"kicker\">عن الدورة<\u002Fspan>\n      <h2 class=\"sec-title\">تدريب حقيقي… يبدأ من اليوم الأول.<\u002Fh2>\n      <p class=\"sec-sub\">ندعوك للاستمتاع بتجربة عملية مكثفة، تُعيد تشكيل حضورك أمام الكاميرا من البداية. الاحتراف لا يُكتسب بالاستماع فقط… بل بالممارسة.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"pillars-grid\">\n      <div class=\"pillar\">\n        <div class=\"num\">01<\u002Fdiv>\n        <h3>ظهور مباشر أمام الكاميرا<\u002Fh3>\n        <p>تطبيق فوري في كل يوم تدريبي. تقف، تسجّل، تشاهد نفسك، وتعرف بالضبط أين موضع قوتك وأين تحتاج تطوير.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pillar\">\n        <div class=\"num\">02<\u002Fdiv>\n        <h3>تقييم احترافي دقيق<\u002Fh3>\n        <p>تقييم فردي لكل متدرّب على حدة، يُحدّد نقاط القوة والضعف بمعايير الإعلام الحديث — لا مجاملات.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pillar\">\n        <div class=\"num\">03<\u002Fdiv>\n        <h3>تصحيح الأخطاء فورًا<\u002Fh3>\n        <p>لا تنتظر نهاية الدورة لتكتشف ما الذي تفعله بشكل خاطئ. تكتشف وتصحّح في نفس اللحظة، أمام عدسة الكاميرا.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pillar\">\n        <div class=\"num\">04<\u002Fdiv>\n        <h3>تطوير تدريجي ملحوظ<\u002Fh3>\n        <p>الفرق بين فيديو اليوم الأول وفيديو اليوم الأخير… هو الفرق بين شخصين مختلفين تمامًا.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CURRICULUM -->\n<section id=\"curriculum\" class=\"curr\">\n  <div class=\"container\">\n    <div class=\"sec-head\">\n      <span class=\"kicker\">المحتوى الكامل<\u002Fspan>\n      <h2 class=\"sec-title\">خمسة أيام، خمس مراحل، شخصية إعلامية جديدة.<\u002Fh2>\n      <p class=\"sec-sub\">تنقّل بين أيام الدورة لاستعراض المحاور النظرية والتطبيقات العملية لكل يوم.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"day-tabs\" id=\"dayTabs\">\n      <button class=\"day-tab active\" data-day=\"1\"><span class=\"n\">DAY 01<\u002Fspan> أساسيات الظهور<\u002Fbutton>\n      <button class=\"day-tab\" data-day=\"2\"><span class=\"n\">DAY 02<\u002Fspan> كتابة وتقديم النص<\u002Fbutton>\n      <button class=\"day-tab\" data-day=\"3\"><span class=\"n\">DAY 03<\u002Fspan> الأداء والتفاعل<\u002Fbutton>\n      <button class=\"day-tab\" data-day=\"4\"><span class=\"n\">DAY 04<\u002Fspan> الإنتاج والتصوير<\u002Fbutton>\n      <button class=\"day-tab\" data-day=\"5\"><span class=\"n\">DAY 05<\u002Fspan> بيئة الإنتاج<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- DAY 1 -->\n    <div class=\"day-panel active\" data-day=\"1\">\n      <div class=\"day-main\">\n        <h3>اليوم الأول · أساسيات الظهور أمام الكاميرا<\u002Fh3>\n        <div class=\"balance\">\n          <span class=\"chip theory\"><span class=\"sw\"><\u002Fspan>٨٠٪ نظري<\u002Fspan>\n          <span class=\"chip practice\"><span class=\"sw\"><\u002Fspan>٢٠٪ عملي<\u002Fspan>\n        <\u002Fdiv>\n        <ul class=\"topics\">\n          <li><strong>الفرق بين<\u002Fstrong> التقديم التلفزيوني التقليدي والتقديم للسوشيال ميديا.<\u002Fli>\n          <li>متطلبات التقديم التلفزيوني الإخباري.<\u002Fli>\n          <li>متطلبات التقديم التلفزيوني الحواري.<\u002Fli>\n          <li>بناء الحضور الإعلامي — <strong>الكاريزما والثقة<\u002Fstrong>.<\u002Fli>\n          <li>لغة الجسد أمام الكاميرا.<\u002Fli>\n          <li>التحكم بالصوت: نبرة · سرعة · وضوح.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"day-side\">\n        <h4>التطبيق العملي<\u002Fh4>\n        <ul>\n          <li><span class=\"lbl\">PRACTICE 01<\u002Fspan>تسجيل فيديو تعريفي لكل متدرّب.<\u002Fli>\n          <li><span class=\"lbl\">PRACTICE 02<\u002Fspan>تمرين قراءة نص قصير أمام الكاميرا.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- DAY 2 -->\n    <div class=\"day-panel\" data-day=\"2\">\n      <div class=\"day-main\">\n        <h3>اليوم الثاني · كتابة وتقديم النص<\u002Fh3>\n        <div class=\"balance\">\n          <span class=\"chip theory\"><span class=\"sw\"><\u002Fspan>٥٠٪ نظري<\u002Fspan>\n          <span class=\"chip practice\"><span class=\"sw\"><\u002Fspan>٥٠٪ عملي<\u002Fspan>\n        <\u002Fdiv>\n        <ul class=\"topics\">\n          <li>كيف تكتب <strong>سكريبت<\u002Fstrong> مناسبًا للسوشيال ميديا.<\u002Fli>\n          <li>الفرق بين: الفيديو الإخباري · التفاعلي · التحليلي.<\u002Fli>\n          <li>بناء <strong>Hook<\u002Fstrong> قوي (جملة البداية).<\u002Fli>\n          <li>تقنيات الإلقاء الطبيعي بدون تكلّف.<\u002Fli>\n          <li>مهارات التعامل مع القارئ الآلي (الأوتوكيو).<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"day-side\">\n        <h4>التطبيق العملي<\u002Fh4>\n        <ul>\n          <li><span class=\"lbl\">PRACTICE 01<\u002Fspan>كتابة سكريبت بطول ٣٠–٦٠ ثانية.<\u002Fli>\n          <li><span class=\"lbl\">PRACTICE 02<\u002Fspan>تقديمه أمام الكاميرا مع تقييم مباشر.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- DAY 3 -->\n    <div class=\"day-panel\" data-day=\"3\">\n      <div class=\"day-main\">\n        <h3>اليوم الثالث · الأداء الاحترافي والتفاعل<\u002Fh3>\n        <div class=\"balance\">\n          <span class=\"chip practice\"><span class=\"sw\"><\u002Fspan>تطبيق مكثف<\u002Fspan>\n        <\u002Fdiv>\n        <ul class=\"topics\">\n          <li>التقديم بعفوية أمام الكاميرا — <strong>الارتجال<\u002Fstrong>.<\u002Fli>\n          <li>التعامل مع الأخطاء أثناء التصوير.<\u002Fli>\n          <li>الفرق بين التقديم المباشر والمسجّل.<\u002Fli>\n          <li>استخدام تعبيرات الوجه بذكاء.<\u002Fli>\n          <li>مخاطبة الجمهور وكأنك تتحدث مع شخص واحد.<\u002Fli>\n          <li>التفاعل مع التعليقات والمتابعين.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"day-side\">\n        <h4>التطبيق العملي<\u002Fh4>\n        <ul>\n          <li><span class=\"lbl\">PRACTICE 01<\u002Fspan>تسجيل فيديو بأسلوب ريلز / تيك توك.<\u002Fli>\n          <li><span class=\"lbl\">PRACTICE 02<\u002Fspan>إعادة الأداء بعد التقييم.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- DAY 4 -->\n    <div class=\"day-panel\" data-day=\"4\">\n      <div class=\"day-main\">\n        <h3>اليوم الرابع · الإنتاج والتصوير للسوشيال ميديا<\u002Fh3>\n        <div class=\"balance\">\n          <span class=\"chip practice\"><span class=\"sw\"><\u002Fspan>تطبيق ميداني<\u002Fspan>\n        <\u002Fdiv>\n        <ul class=\"topics\">\n          <li>أساسيات التصوير بالموبايل.<\u002Fli>\n          <li>الإضاءة المناسبة: <strong>بسيطة واحترافية<\u002Fstrong>.<\u002Fli>\n          <li>زوايا الكاميرا.<\u002Fli>\n          <li>استخدام الميكروفون.<\u002Fli>\n          <li>أساسيات المونتاج السريع.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"day-side\">\n        <h4>التطبيق العملي<\u002Fh4>\n        <ul>\n          <li><span class=\"lbl\">PRACTICE 01<\u002Fspan>تصوير فيديو كامل: فكرة + تقديم + تصوير.<\u002Fli>\n          <li><span class=\"lbl\">PRACTICE 02<\u002Fspan>تعديل الفيديو بشكل بسيط.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- DAY 5 -->\n    <div class=\"day-panel\" data-day=\"5\">\n      <div class=\"day-main\">\n        <h3>اليوم الخامس · بيئة الإنتاج التلفزيوني<\u002Fh3>\n        <div class=\"balance\">\n          <span class=\"chip theory\"><span class=\"sw\"><\u002Fspan>تكامل نهائي<\u002Fspan>\n          <span class=\"chip practice\"><span class=\"sw\"><\u002Fspan>مشروع ختامي<\u002Fspan>\n        <\u002Fdiv>\n        <ul class=\"topics\">\n          <li><strong>عناصر بيئة العمل:<\u002Fstrong> المنتج · المخرج · مشغّل القارئ · منتج المقابلات.<\u002Fli>\n          <li>دور المقدّم في دورة العمل التلفزيوني.<\u002Fli>\n          <li>المذيع الميداني — العلاقة بين المراسل والمذيع.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"day-side\">\n        <h4>المشروع النهائي<\u002Fh4>\n        <ul>\n          <li><span class=\"lbl\">FINAL<\u002Fspan>إنتاج فيديو احترافي كامل.<\u002Fli>\n          <li><span class=\"lbl\">REVIEW<\u002Fspan>تقييم فردي لكل متدرّب مع ملاحظات تطوير.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- OPPORTUNITY -->\n<section id=\"opportunity\" class=\"opp\">\n  <div class=\"container\">\n    <div class=\"opp-card\">\n      <div class=\"inner\">\n        <div>\n          <span class=\"kicker\">المفاجأة الأهم<\u002Fspan>\n          <h2>لا تتعلّم فقط… بل <span class=\"red\">تقترب من بداية فعلية<\u002Fspan> في المجال.<\u002Fh2>\n          <p>المشاركون الذين يتم إجازتهم وفق التقييم النهائي، سيحصلون على فرصة حقيقية للانضمام إلينا في <strong>Media Türk TV<\u002Fstrong> كمقدّمي محتوى للمنصة. هذه ليست شهادة تُعلَّق على الحائط — بل بداية مسار.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"opp-stamp\">\n          <div class=\"inner-stamp\">\n            <span class=\"red\">FRESH<br>FACES<\u002Fspan>\n            انضمّ كمقدّم محتوى<br>على منصتنا\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- OUTCOMES -->\n<section id=\"outcomes\">\n  <div class=\"container\">\n    <div class=\"sec-head\">\n      <span class=\"kicker\">مخرجات الدورة<\u002Fspan>\n      <h2 class=\"sec-title\">بنهاية الدورة، أنت قادر على:<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"outcomes-grid\">\n      <div class=\"outcome\">\n        <div class=\"ico\">01<\u002Fdiv>\n        <h4>الظهور بثقة أمام الكاميرا<\u002Fh4>\n        <p>حضور إعلامي مدروس، يجمع بين الكاريزما والاحترافية.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"outcome\">\n        <div class=\"ico\">02<\u002Fdiv>\n        <h4>كتابة وتقديم محتوى جذّاب<\u002Fh4>\n        <p>من فكرة فارغة إلى سكريبت متماسك وأداء جذاب.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"outcome\">\n        <div class=\"ico\">03<\u002Fdiv>\n        <h4>تصوير فيديو احترافي بالموبايل<\u002Fh4>\n        <p>إضاءة، صوت، زوايا، مونتاج — بأبسط الأدوات.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"outcome\">\n        <div class=\"ico\">04<\u002Fdiv>\n        <h4>أسلوبك الخاص في التقديم<\u002Fh4>\n        <p>توقيع إعلامي يميّزك عن غيرك ولا يشبه أحدًا.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"outcome\">\n        <div class=\"ico\">05<\u002Fdiv>\n        <h4>فهم بيئة العمل التلفزيوني<\u002Fh4>\n        <p>تعرف من هم حولك في الكواليس وكيف تتعامل معهم.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"outcome\">\n        <div class=\"ico\">06<\u002Fdiv>\n        <h4>جاهزية للظهور الفعلي<\u002Fh4>\n        <p>تخرج من الدورة وأنت مستعدّ للوقوف أمام كاميرا حقيقية.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SIGNUP -->\n<section id=\"register\" class=\"signup\">\n  <div class=\"container signup-grid\">\n    <div class=\"signup-info\">\n      <span class=\"kicker\">سجّل الآن<\u002Fspan>\n      <h2>المقاعد محدودة… والفرص لا تتكرّر كثيرًا.<\u002Fh2>\n      <p>اترك بياناتك وسيتواصل معك فريق Media Türk TV لتأكيد التسجيل .<\u002Fp>\n\n      <div class=\"checklist\">\n        <div class=\"ch\"><span class=\"tick\">✓<\u002Fspan><span>تأكيد التسجيل بعد تواصل فريق العمل عبر واتساب .<\u002Fspan><\u002Fdiv>\n        <div class=\"ch\"><span class=\"tick\">✓<\u002Fspan><span>رسوم مدعومة لفترة محدودة جدًا.<\u002Fspan><\u002Fdiv>\n        <div class=\"ch\"><span class=\"tick\">✓<\u002Fspan><span>إمكانية الانضمام كمقدّم محتوى للمنصة بعد التقييم في نهاية الدورة.<\u002Fspan><\u002Fdiv>\n        <div class=\"ch\"><span class=\"tick\">✓<\u002Fspan><span>شهادة حضور الدورة باسم Media Türk TV.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"urgency\"><span class=\"dot\"><\u002Fspan> آخر فرصة للحجز بالسعر المخفّض<\u002Fdiv>\n    <\u002Fdiv>\n\n    <form class=\"form-card\" id=\"signupForm\" autocomplete=\"on\" novalidate=\"\">\n      <div class=\"form-title\">\n        <h3>احجز مقعدك<\u002Fh3>\n        <span class=\"step\">STEP 01 / 01<\u002Fspan>\n      <\u002Fdiv>\n      <p class=\"form-sub\">بياناتك محفوظة بسرية تامة ولن تُستخدم إلا للتواصل.<\u002Fp>\n\n      <div class=\"field\">\n        <label for=\"fullName\">الاسم الكامل<\u002Flabel>\n        <input id=\"fullName\" name=\"fullName\" type=\"text\" placeholder=\"اكتب اسمك كما تريد أن يظهر في الشهادة\" required=\"\">\n      <\u002Fdiv>\n\n      <div class=\"field\">\n        <label for=\"phone\">رقم الواتساب<\u002Flabel>\n        <div class=\"field-row\">\n          <select id=\"country\" name=\"country\" aria-label=\"مفتاح الدولة\">\n            <option>+90 🇹🇷<\u002Foption>\n            <option>+966 🇸🇦<\u002Foption>\n            <option>+971 🇦🇪<\u002Foption>\n            <option>+20 🇪🇬<\u002Foption>\n            <option>+962 🇯🇴<\u002Foption>\n            <option>+965 🇰🇼<\u002Foption>\n            <option>+974 🇶🇦<\u002Foption>\n            <option>+973 🇧🇭<\u002Foption>\n            <option>+212 🇲🇦<\u002Foption>\n            <option>+213 🇩🇿<\u002Foption>\n            <option>+216 🇹🇳<\u002Foption>\n            <option>+218 🇱🇾<\u002Foption>\n            <option>+964 🇮🇶<\u002Foption>\n            <option>+970 🇵🇸<\u002Foption>\n            <option>+961 🇱🇧<\u002Foption>\n            <option>+963 🇸🇾<\u002Foption>\n            <option>+967 🇾🇪<\u002Foption>\n            <option>+968 🇴🇲<\u002Foption>\n            <option>+249 🇸🇩<\u002Foption>\n          <\u002Fselect>\n          <input id=\"phone\" name=\"phone\" type=\"tel\" inputmode=\"numeric\" placeholder=\"5XX XXX XX XX\" required=\"\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"field\">\n        <label for=\"email\">البريد الإلكتروني<\u002Flabel>\n        <input id=\"email\" name=\"email\" type=\"email\" placeholder=\"you@example.com\" required=\"\">\n      <\u002Fdiv>\n\n      <button type=\"submit\" class=\"submit\">احجز مقعدك ←<\u002Fbutton>\n      <p class=\"form-foot\">بالضغط على زر الحجز أنت توافق على التواصل من فريق Media Türk TV.<\u002Fp>\n\n      <div class=\"success\" id=\"success\">\n        <div class=\"check\">✓<\u002Fdiv>\n        <h3>تم استلام طلبك بنجاح<\u002Fh3>\n        <p>سيتواصل معك فريق Media Türk TV خلال ٢٤ ساعة لتأكيد الحجز.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fform>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer>\n  <div class=\"container foot\">\n    <div class=\"brand\">\n      <img src=\"a70f3b3c-1dc6-4a9f-804a-af9985ddeb12\" alt=\"Media Türk TV\" style=\"width:38px;height:38px;border-radius:8px\">\n      <div class=\"b-text\">\n        <span class=\"ar\" style=\"font-family: Cairo; font-weight: 800; line-height: 2\">ميديا ترك<\u002Fspan>\n        <span class=\"en\" style=\"font-size:11px;color:var(--muted);letter-spacing:1.5px\">MEDIA <span style=\"color:var(--red)\">TÜRK<\u002Fspan> TV<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div>© 2026 Media Türk TV · جميع الحقوق محفوظة<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<a href=\"#register\" class=\"float-cta\">سجّل الآن ←<\u002Fa>\n\n<script src=\"03ded780-9749-4adf-bfbd-5933a85dca57\"><\u002Fscript>\n<script>\n  // Mark filled state on image-slot so empty-state scene hides\n  (function(){\n    const slot = document.getElementById('hero-studio');\n    if(!slot) return;\n    const mark = () => {\n      const filled = !!(slot.shadowRoot && slot.shadowRoot.querySelector('img'));\n      slot.dataset.filled = filled ? 'true' : 'false';\n    };\n    const obs = new MutationObserver(mark);\n    const start = () => { if(slot.shadowRoot){ obs.observe(slot.shadowRoot, {childList:true, subtree:true, attributes:true}); mark(); } else setTimeout(start, 50); };\n    start();\n  })();\n<\u002Fscript>\n<script>\n  // Day tabs\n  const tabs = document.querySelectorAll('.day-tab');\n  const panels = document.querySelectorAll('.day-panel');\n  tabs.forEach(t => t.addEventListener('click', () => {\n    tabs.forEach(x => x.classList.remove('active'));\n    panels.forEach(x => x.classList.remove('active'));\n    t.classList.add('active');\n    document.querySelector('.day-panel[data-day=\"'+t.dataset.day+'\"]').classList.add('active');\n  }));\n\n  // Form\n  const form = document.getElementById('signupForm');\n  form.addEventListener('submit', (e) => {\n    e.preventDefault();\n    const name = document.getElementById('fullName').value.trim();\n    const phone = document.getElementById('phone').value.trim();\n    const email = document.getElementById('email').value.trim();\n    if(!name || !phone || !email){\n      alert('من فضلك أكمل جميع الحقول.');\n      return;\n    }\n    // Hide form fields, show success\n    [...form.children].forEach(c => { if(c.id !== 'success') c.style.display = 'none'; });\n    document.getElementById('success').classList.add('show');\n  });\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
